name: Release Trojan Manager

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Frontend
        run: |
          git clone --depth 1 https://github.com/akudamatata/trojan-web.git temp-web
          cd temp-web
          npm install
          npm run build
          cd ..
          mkdir -p web/templates
          cp -r temp-web/dist/* web/templates/
          rm -rf temp-web

      - name: Build Binary
        run: |
          mkdir -p result
          version=${GITHUB_REF#refs/tags/}
          now=$(date -u "+%Y%m%d-%H%M")
          go_version=$(go version|awk '{print $3,$4}')
          git_version=${{ github.sha }}
          ldflags="-w -s -X 'trojan/trojan.MVersion=$version' -X 'trojan/trojan.BuildDate=$now' -X 'trojan/trojan.GoVersion=$go_version' -X 'trojan/trojan.GitVersion=$git_version'"
          
          GOOS=linux GOARCH=amd64 go build -ldflags "$ldflags" -o "result/trojan-linux-amd64" .
          GOOS=linux GOARCH=arm64 go build -ldflags "$ldflags" -o "result/trojan-linux-arm64" .

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=${GITHUB_REF#refs/tags/}

          # 1. 删除 Release 并同时清理 tag，彻底规避 422 冲突
          gh release delete "$version" --yes --cleanup-tag 2>/dev/null || true

          # 2. 等待 GitHub API 完成清理（删除是异步的）
          sleep 5

          # 3. 将本次构建触发的 tag 重新推到远端
          git push origin "refs/tags/$version"

          # 4. 等待 tag 在 GitHub 端注册完毕
          sleep 3

          # 5. 创建 Release 并上传二进制产物
          gh release create "$version" \
            --title "$version" \
            --notes "Release $version" \
            result/trojan-linux-amd64 \
            result/trojan-linux-arm64
